name: Daily Signal

# Runs in GitHub's cloud every day — independent of any of Jon's machines.
# 11:12 UTC ≈ 6:12 AM America/Chicago (CDT). Adjust if you want a different slot.
on:
  schedule:
    - cron: "12 11 * * *"
  workflow_dispatch: {}   # lets you run it on demand from the Actions tab

permissions:
  contents: write          # needed to push the updated index.html back

concurrency:
  group: daily-signal
  cancel-in-progress: false

jobs:
  signal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install --quiet "anthropic>=0.40"

      - name: Generate today's idea
        id: gen
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DAILY_MODEL: claude-sonnet-4-6
        run: |
          set +e
          python tools/generate_daily_idea.py --out new_idea.json
          code=$?
          echo "code=$code" >> "$GITHUB_OUTPUT"
          if [ "$code" -eq 4 ]; then echo "Model skipped today — nothing solid."; exit 0; fi
          if [ "$code" -ne 0 ]; then echo "Generator error (exit $code)"; exit "$code"; fi

      - name: Splice into the page
        if: steps.gen.outputs.code == '0'
        id: splice
        run: |
          set +e
          python tools/update_daily_signal.py --from-file new_idea.json --stamp
          code=$?
          echo "code=$code" >> "$GITHUB_OUTPUT"
          # exit 2 = duplicate → fine, just no commit; anything else nonzero = real error
          if [ "$code" -eq 2 ]; then echo "Duplicate idea — no change."; exit 0; fi
          exit "$code"

      - name: Commit & push (auto-deploys via Vercel)
        if: steps.splice.outputs.code == '0'
        run: |
          rm -f new_idea.json
          if git diff --quiet -- index.html; then
            echo "No change to index.html — nothing to commit."
            exit 0
          fi
          git config user.name  "agentic-os-daily-bot"
          git config user.email "actions@users.noreply.github.com"
          git add index.html
          git commit -m "daily signal: $(date -u +%Y-%m-%d)"
          git push
